<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบผู้ดูแล - เกียรติบัตร</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .menu-item.active { background-color: #1a73e8; color: white; }
    .menu-item.active:hover { background-color: #1557b0; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- ============ หน้า Login ============ -->
  <div id="loginPage" class="fixed inset-0 bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md fade-in">
      <div class="text-center mb-6">
        <div class="text-5xl mb-3">🔐</div>
        <h1 class="text-2xl font-bold text-gray-800">ระบบผู้ดูแล</h1>
        <p class="text-gray-500 text-sm mt-1">กรุณาเข้าสู่ระบบ</p>
      </div>
      <form onsubmit="doLogin(event)">
        <input type="password" id="passwordInput" placeholder="รหัสผ่าน"
               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none mb-4"
               required>
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-medium transition">
          เข้าสู่ระบบ
        </button>
      </form>
      <a href="index.html" class="block text-center text-sm text-blue-600 hover:underline mt-4">
        → ไปหน้าค้นหาเกียรติบัตร (User)
      </a>
    </div>
  </div>

  <!-- ============ หน้าหลัก (หลัง Login) ============ -->
  <div id="mainApp" class="hidden">
    <div class="flex h-screen">

      <!-- ===== Sidebar ===== -->
      <aside class="w-64 bg-white shadow-lg flex flex-col flex-shrink-0">
        <div class="p-5 border-b">
          <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center text-xl">🎓</div>
            <div>
              <h1 class="font-bold text-gray-800">ระบบผู้ดูแล</h1>
              <p class="text-xs text-gray-500" id="userRole"></p>
            </div>
          </div>
        </div>

        <nav class="flex-1 p-3 space-y-1 overflow-y-auto" id="menuNav">
          <button onclick="showPage('dashboard')" data-menu="dashboard"
                  class="menu-item w-full text-left px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-100 transition flex items-center gap-3">
            <span>📊</span> Dashboard
          </button>
          <button onclick="showPage('certificates')" data-menu="certificates"
                  class="menu-item w-full text-left px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-100 transition flex items-center gap-3">
            <span>📜</span> รายชื่อเกียรติบัตร
          </button>
          <button onclick="showPage('questions')" data-menu="questions" data-admin-staff
                  class="menu-item w-full text-left px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-100 transition flex items-center gap-3">
            <span>❓</span> คำถามแบบประเมิน
          </button>
          <button onclick="showPage('results')" data-menu="results"
                  class="menu-item w-full text-left px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-100 transition flex items-center gap-3">
            <span>📈</span> ผลการประเมิน
          </button>
          <button onclick="showPage('settings')" data-menu="settings" data-admin-only
                  class="menu-item w-full text-left px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-100 transition flex items-center gap-3">
            <span>⚙️</span> ตั้งค่าระบบ
          </button>
        </nav>

        <div class="p-3 border-t">
          <a href="index.html" class="block text-center text-xs text-gray-500 hover:text-blue-600 mb-2">🔍 หน้าค้นหา (User)</a>
          <button onclick="doLogout()"
                  class="w-full px-4 py-2 rounded-xl text-red-600 hover:bg-red-50 transition flex items-center justify-center gap-2 text-sm">
            <span>🚪</span> ออกจากระบบ
          </button>
        </div>
      </aside>

      <!-- ===== Content Area ===== -->
      <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm px-6 py-4 flex items-center justify-between flex-shrink-0">
          <h2 class="text-xl font-semibold text-gray-800" id="pageTitle">Dashboard</h2>
          <button onclick="refreshCurrentPage()" class="text-gray-500 hover:text-blue-600 text-sm flex items-center gap-1">
            🔄 รีเฟรช
          </button>
        </header>

        <main class="flex-1 overflow-y-auto p-6">
          <!-- หน้า: Dashboard -->
          <div id="page-dashboard" class="page-content"></div>
          <!-- หน้า: รายชื่อเกียรติบัตร -->
          <div id="page-certificates" class="page-content hidden"></div>
          <!-- หน้า: คำถามแบบประเมิน -->
          <div id="page-questions" class="page-content hidden"></div>
          <!-- หน้า: ผลการประเมิน -->
          <div id="page-results" class="page-content hidden"></div>
          <!-- หน้า: ตั้งค่าระบบ -->
          <div id="page-settings" class="page-content hidden"></div>
        </main>
      </div>
    </div>
  </div>

  <!-- ============ Modal (สำหรับเพิ่ม/แก้คำถาม) ============ -->
  <div id="modal" class="fixed inset-0 bg-black/40 items-center justify-center z-50 hidden p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto fade-in">
      <div class="flex items-center justify-between p-5 border-b sticky top-0 bg-white">
        <h3 class="text-lg font-semibold" id="modalTitle">เพิ่มคำถาม</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
      </div>
      <div class="p-5" id="modalBody"></div>
    </div>
  </div>

  <!-- ============ Loading ============ -->
  <div id="loading" class="fixed inset-0 bg-black/40 flex items-center justify-center z-[100] hidden">
    <div class="bg-white rounded-2xl px-8 py-6 flex flex-col items-center gap-3 shadow-2xl">
      <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-gray-600 font-medium" id="loadingText">กำลังโหลด...</p>
    </div>
  </div>

  <script>
    // ============================================================
    //  ตั้งค่า: ใส่ Web App URL ของคุณตรงนี้ (เหมือน index.html)
    // ============================================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbxWSqRuz6oHlULw0Hl8DBEeRH_-bD9u0NuwARLU1MTM_FybOSUovRWrGZ2IClN2H4h4aw/exec'; // TODO: วาง Web App URL

    let currentUser = { role: '', displayName: '' };
    let currentPage = 'dashboard';
    let questionsData = [];
    let resultsData = null;

    // ============ ฟังก์ชันเรียก API ============
    async function callApi(action, params = {}, method = 'GET') {
      try {
        if (method === 'GET') {
          const query = new URLSearchParams(Object.assign({ action }, params)).toString();
          const res = await fetch(API_URL + '?' + query);
          return await res.json();
        } else {
          const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(Object.assign({ action }, params)) });
          return await res.json();
        }
      } catch (err) {
        return { success: false, message: 'เชื่อมต่อไม่สำเร็จ: ' + err.message };
      }
    }

    // ============ Cache: ลดการเรียก API ซ้ำเมื่อสลับเมนู ============
    const _apiCache = {};
    async function callApiCached(action, params = {}, ttlMs = 60000) {
      const key = action + ':' + JSON.stringify(params);
      const hit = _apiCache[key];
      if (hit && (Date.now() - hit.t) < ttlMs) return hit.v;
      const v = await callApi(action, params);
      if (v && v.success) _apiCache[key] = { t: Date.now(), v };
      return v;
    }
    function clearApiCache(action) {
      if (!action) { Object.keys(_apiCache).forEach(k => delete _apiCache[k]); return; }
      Object.keys(_apiCache).forEach(k => { if (k.indexOf(action + ':') === 0) delete _apiCache[k]; });
    }

    // ============ UI Helper ============
    function showLoading(t = 'กำลังโหลด...') { document.getElementById('loadingText').textContent = t; document.getElementById('loading').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loading').classList.add('hidden'); }
    function showToast(msg, type = 'success') {
      Swal.fire({
        toast: true,
        position: 'top-end',
        icon: type === 'error' ? 'error' : type === 'info' ? 'info' : 'success',
        title: msg,
        showConfirmButton: false,
        timer: 3500,
        timerProgressBar: true,
        customClass: { popup: 'text-sm' }
      });
    }
    async function confirmAction(title, text, confirmButtonText = 'ตกลง') {
      const result = await Swal.fire({
        title: title,
        text: text,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: confirmButtonText,
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#2563eb',
        cancelButtonColor: '#6b7280',
        reverseButtons: true
      });
      return result.isConfirmed;
    }

    // ============ Login / Logout ============
    async function doLogin(event) {
      event.preventDefault();
      const password = document.getElementById('passwordInput').value;
      showLoading('กำลังเข้าสู่ระบบ...');
      const res = await callApi('login', { password });
      hideLoading();

      if (res.success) {
        currentUser = { role: res.role, displayName: res.displayName };
        sessionStorage.setItem('certAdminUser', JSON.stringify(currentUser));
        enterApp();
      } else {
        showToast(res.message || 'รหัสผ่านไม่ถูกต้อง', 'error');
      }
    }

    function doLogout() {
      sessionStorage.removeItem('certAdminUser');
      location.reload();
    }

    function enterApp() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      document.getElementById('userRole').textContent =
        (currentUser.role === 'admin' ? '👑 ' : '👤 ') + currentUser.displayName;

      // ===== ซ่อนเมนูตาม role =====
      if (currentUser.role === 'staff') {
        // Staff: ซ่อนเมนู admin-only (ตั้งค่าระบบ)
        document.querySelectorAll('[data-admin-only]').forEach(el => el.classList.add('hidden'));
      }
      // admin เห็นครบทุกเมนู

      showPage('dashboard');
    }

    // ============ Navigation ============
    function showPage(page) {
      // เช็คสิทธิ์: staff ห้ามเข้า settings
      if (page === 'settings' && currentUser.role !== 'admin') {
        showToast('คุณไม่มีสิทธิ์เข้าถึงหน้านี้', 'error');
        return;
      }

      currentPage = page;
      document.querySelectorAll('.page-content').forEach(el => el.classList.add('hidden'));
      document.getElementById('page-' + page).classList.remove('hidden');

      document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
      document.querySelector(`[data-menu="${page}"]`).classList.add('active');

      const titles = { dashboard: 'Dashboard', certificates: 'รายชื่อเกียรติบัตร', questions: 'คำถามแบบประเมิน', results: 'ผลการประเมิน', settings: 'ตั้งค่าระบบ' };
      document.getElementById('pageTitle').textContent = titles[page];

      // โหลดข้อมูลของหน้านั้น
      const loaders = { dashboard: loadDashboard, certificates: loadCertificates, questions: loadQuestions, results: loadResults, settings: loadSettings };
      loaders[page]();
    }

    function refreshCurrentPage() { clearApiCache(); showPage(currentPage); }

    // ============================================================
    //  หน้า 1: Dashboard
    // ============================================================
    async function loadDashboard() {
      const el = document.getElementById('page-dashboard');
      el.innerHTML = '<div class="text-center py-10 text-gray-400">กำลังโหลด...</div>';
      const res = await callApiCached('getDashboard');
      if (!res.success) { el.innerHTML = '<p class="text-red-500">โหลดข้อมูลไม่สำเร็จ</p>'; return; }

      el.innerHTML = `
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-6">
          ${statCard('📜', 'เกียรติบัตรทั้งหมด', res.totalCertificates, 'blue')}
          ${statCard('✅', 'ประเมินแล้ว', res.totalResponses, 'green')}
          ${statCard('⏳', 'ยังไม่ประเมิน', res.notEvaluated, 'yellow')}
          ${statCard('📄', 'สร้างไฟล์แล้ว', res.generated, 'purple')}
        </div>
        <div class="bg-white rounded-2xl shadow p-6">
          <h3 class="font-semibold text-gray-800 mb-4">📊 คะแนนความพึงพอใจเฉลี่ย (ภาพรวม)</h3>
          <div class="flex items-center gap-6">
            <div class="text-5xl font-bold text-blue-600">${res.avgScore.toFixed(2)}</div>
            <div>
              <p class="text-gray-500 text-sm">จากคะแนนเต็ม 5.00</p>
              <span class="inline-block mt-1 px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium">
                ระดับ: ${res.avgInterpret}
              </span>
            </div>
          </div>
        </div>`;
    }

    function statCard(icon, label, value, color) {
      const colors = { blue: 'border-blue-500', green: 'border-green-500', yellow: 'border-yellow-500', purple: 'border-purple-500' };
      return `<div class="bg-white rounded-2xl shadow p-5 border-l-4 ${colors[color]}">
        <div class="text-3xl mb-2">${icon}</div>
        <div class="text-2xl font-bold text-gray-800">${value}</div>
        <div class="text-sm text-gray-500">${label}</div>
      </div>`;
    }

    // ============================================================
    //  หน้า 2: รายชื่อเกียรติบัตร
    // ============================================================
    async function loadCertificates() {
      const el = document.getElementById('page-certificates');
      el.innerHTML = '<div class="text-center py-10 text-gray-400">กำลังโหลด...</div>';
      const res = await callApiCached('getCertificates');
      if (!res.success) { el.innerHTML = '<p class="text-red-500">โหลดข้อมูลไม่สำเร็จ</p>'; return; }

      let rows = '';
      res.data.forEach(c => {
        const badge = getStatusBadge(c.status);
        const certPayload = encodeURIComponent(JSON.stringify(c));
        const fileBtn = c.fileUrl
          ? `<a href="${escapeHtml(c.fileUrl)}" target="_blank" class="text-blue-600 hover:underline text-xs">เปิดไฟล์</a>`
          : `<button onclick="genOneFromPayload('${certPayload}')" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded-lg text-xs">สร้าง</button>`;
        rows += `<tr class="border-b hover:bg-gray-50">
          <td class="px-4 py-3">${escapeHtml(c.runNo)}</td>
          <td class="px-4 py-3 font-medium">${escapeHtml(c.certNo)}</td>
          <td class="px-4 py-3">${escapeHtml(c.fullName)}</td>
          <td class="px-4 py-3 text-gray-600">${escapeHtml(c.school)}</td>
          <td class="px-4 py-3">${badge}</td>
          <td class="px-4 py-3 text-center">${fileBtn}</td>
          <td class="px-4 py-3 text-center">
            <div class="flex justify-center gap-2">
              <button onclick="openCertificateModal('${certPayload}')" class="text-blue-600 hover:bg-blue-50 px-2 py-1 rounded text-xs">แก้ไข</button>
              <button onclick="deleteCertificate('${escapeJsAttr(c.certNo)}')" class="text-red-600 hover:bg-red-50 px-2 py-1 rounded text-xs">ลบ</button>
            </div>
          </td>
        </tr>`;
      });

      el.innerHTML = `
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-3 mb-4">
          <p class="text-gray-500 text-sm">ทั้งหมด ${res.count} รายการ</p>
          <div class="flex flex-wrap gap-2">
            <button onclick="downloadCertificateImportTemplate()" class="bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2">
              <span>⬇️</span> ตัวอย่างไฟล์
            </button>
            <button onclick="openCertificateImport()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2">
              <span>📥</span> นำเข้า CSV/Excel
            </button>
            <button onclick="genAll()" class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2 rounded-xl text-sm font-medium flex items-center gap-2">
              <span>⚡</span> สร้างเกียรติบัตรทั้งหมด
            </button>
          </div>
        </div>
        <input type="file" id="certificateImportFile" accept=".csv,.xlsx,.xls" class="hidden" onchange="importCertificateFile(event)">
        <div class="bg-white rounded-2xl shadow overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-gray-50 text-gray-600 text-left">
                <tr>
                  <th class="px-4 py-3">No.</th><th class="px-4 py-3">เลขที่</th>
                  <th class="px-4 py-3">ชื่อ-นามสกุล</th><th class="px-4 py-3">โรงเรียน</th>
                  <th class="px-4 py-3">สถานะ</th><th class="px-4 py-3 text-center">ไฟล์</th><th class="px-4 py-3 text-center">จัดการ</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
    }

    async function genOne(certNo) {
      showLoading('กำลังสร้างเกียรติบัตร...');
      const res = await callApi('generateCertificate', { certNo });
      hideLoading();
      showToast(res.message, res.success ? 'success' : 'error');
      if (res.success) { clearApiCache('getCertificates'); clearApiCache('getDashboard'); loadCertificates(); }
    }

    function genOneFromPayload(payload) {
      const cert = JSON.parse(decodeURIComponent(payload));
      genOne(cert.certNo);
    }

    async function genAll() {
      const confirmed = await confirmAction('สร้างเกียรติบัตรทั้งหมด?', 'ระบบจะสร้างเฉพาะรายการที่ยังไม่มีไฟล์ และอาจใช้เวลาสักครู่', 'สร้างทั้งหมด');
      if (!confirmed) return;
      showLoading('กำลังสร้างเกียรติบัตรทั้งหมด...');
      const res = await callApi('generateAll');
      hideLoading();
      showToast(res.message, res.success ? 'success' : 'error');
      if (res.success) { clearApiCache('getCertificates'); clearApiCache('getDashboard'); loadCertificates(); }
    }

    function openCertificateModal(payload) {
      const cert = JSON.parse(decodeURIComponent(payload));
      document.getElementById('modalTitle').textContent = 'แก้ไขรายชื่อเกียรติบัตร';
      document.getElementById('modalBody').innerHTML = `
        <form onsubmit="saveCertificate(event)" class="space-y-4">
          <input type="hidden" id="cert_originalCertNo" value="${escapeHtml(cert.certNo)}">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">No.</label>
              <input type="number" id="cert_runNo" value="${escapeHtml(cert.runNo)}" class="w-full px-3 py-2 border rounded-lg">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">สถานะ</label>
              <select id="cert_status" class="w-full px-3 py-2 border rounded-lg">
                ${certificateStatusOption('ยังไม่ประเมิน', cert.status)}
                ${certificateStatusOption('ประเมินแล้ว', cert.status)}
                ${certificateStatusOption('พร้อมดาวน์โหลด', cert.status)}
              </select>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">เลขที่เกียรติบัตร</label>
            <input type="text" id="cert_certNo" value="${escapeHtml(cert.certNo)}" required class="w-full px-3 py-2 border rounded-lg">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ-นามสกุล</label>
            <input type="text" id="cert_fullName" value="${escapeHtml(cert.fullName)}" required class="w-full px-3 py-2 border rounded-lg">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">โรงเรียน</label>
            <input type="text" id="cert_school" value="${escapeHtml(cert.school)}" class="w-full px-3 py-2 border rounded-lg">
          </div>
          <p class="text-xs text-amber-600 bg-amber-50 rounded-lg px-3 py-2">ถ้าแก้ไขชื่อ โรงเรียน หรือเลขที่ หลังสร้างไฟล์แล้ว ไฟล์ PDF เดิมจะไม่ถูกสร้างใหม่อัตโนมัติ ให้กดสร้างใหม่เมื่อจำเป็น</p>
          <div class="flex gap-3 pt-2">
            <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl font-medium">บันทึก</button>
            <button type="button" onclick="closeModal()" class="px-5 bg-gray-200 hover:bg-gray-300 rounded-xl">ยกเลิก</button>
          </div>
        </form>`;
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function certificateStatusOption(value, current) {

    async function parseCertificateImportFile(file) {
      const name = file.name.toLowerCase();
      if (name.endsWith('.csv')) {
        const text = await readFileAsText(file);
        return normalizeCertificateImportRows(parseCsv(text));
      }

      if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
        if (!window.XLSX) throw new Error('โหลดตัวอ่าน Excel ไม่สำเร็จ กรุณาลองใหม่อีกครั้ง');
        const buffer = await readFileAsArrayBuffer(file);
        const workbook = XLSX.read(buffer, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        return normalizeCertificateImportRows(XLSX.utils.sheet_to_json(sheet, { defval: '' }));
      }

      throw new Error('รองรับเฉพาะไฟล์ .csv, .xlsx, .xls');
    }

    function normalizeCertificateImportRows(sourceRows) {
      return sourceRows.map(row => ({
        runNo: pickImportValue(row, ['runNo', 'No.', 'no', 'ลำดับ']),
        certNo: pickImportValue(row, ['certNo', 'เลขที่', 'เลขที่เกียรติบัตร']),
        fullName: pickImportValue(row, ['fullName', 'ชื่อ-นามสกุล', 'ชื่อ', 'name']),
        school: pickImportValue(row, ['school', 'โรงเรียน']),
        status: pickImportValue(row, ['status', 'สถานะ'])
      })).filter(row => row.fullName);
    }

    function pickImportValue(row, keys) {
      for (const key of keys) {
        if (row[key] !== undefined && row[key] !== null && String(row[key]).trim() !== '') return String(row[key]).trim();
      }
      return '';
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || '').replace(/^\ufeff/, ''));
        reader.onerror = () => reject(new Error('อ่านไฟล์ไม่สำเร็จ'));
        reader.readAsText(file, 'UTF-8');
      });
    }

    function readFileAsArrayBuffer(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('อ่านไฟล์ไม่สำเร็จ'));
        reader.readAsArrayBuffer(file);
      });
    }

    function parseCsv(text) {
      const rows = [];
      let row = [], value = '', inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"' && inQuotes && next === '"') { value += '"'; i++; continue; }
        if (char === '"') { inQuotes = !inQuotes; continue; }
        if (char === ',' && !inQuotes) { row.push(value); value = ''; continue; }
        if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(value); rows.push(row); row = []; value = '';
          continue;
        }
        value += char;
      }
      row.push(value); rows.push(row);

      const cleaned = rows.filter(r => r.some(cell => String(cell).trim() !== ''));
      if (!cleaned.length) return [];
      const headers = cleaned[0].map(h => String(h).trim());
      return cleaned.slice(1).map(cells => {
        const obj = {};
        headers.forEach((header, index) => obj[header] = (cells[index] || '').trim());
        return obj;
      });
    }

    function getStatusBadge(status) {
      const map = { 'ยังไม่ประเมิน': 'bg-yellow-100 text-yellow-700', 'ประเมินแล้ว': 'bg-blue-100 text-blue-700', 'พร้อมดาวน์โหลด': 'bg-green-100 text-green-700' };
      return `<span class="px-3 py-1 rounded-full text-xs font-medium ${map[status] || 'bg-gray-100 text-gray-600'}">${escapeHtml(status)}</span>`;
    }

    function escapeHtml(value) {
      return String(value === undefined || value === null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeJsAttr(value) {
      return String(value === undefined || value === null ? '' : value)
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/"/g, '&quot;')
        .replace(/\n/g, '\\n')
        .replace(/\r/g, '\\r');
    }

      </div>`;

      // ===== ตอนที่ 3 =====
      html += `<h3 class="text-lg font-semibold text-gray-800 mb-3 mt-6">💬 ตอนที่ 3: ข้อเสนอแนะ</h3>`;
      res.part3.forEach(q => {
        html += `<div class="bg-white rounded-2xl shadow p-5 mb-4">
          <p class="font-medium text-gray-800 mb-3">${q.questionText} <span class="text-sm text-gray-400">(${q.answers.length} ความเห็น)</span></p>`;
        if (q.answers.length === 0) {
          html += `<p class="text-gray-400 text-sm">ไม่มีผู้แสดงความคิดเห็น</p>`;
        } else {
          html += `<div class="space-y-2">`;
          q.answers.forEach((a, i) => {
            html += `<div class="bg-gray-50 rounded-lg px-4 py-2 text-sm text-gray-700 flex gap-2">
              <span class="text-gray-400">${i+1}.</span><span>${a}</span></div>`;
          });
          html += `</div>`;
        }
        html += `</div>`;
      });

      el.innerHTML = html;
    }

    function exportResultsExcel() {
      if (!resultsData || !resultsData.totalResponses) { showToast('ยังไม่มีข้อมูลผลการประเมินสำหรับส่งออก', 'error'); return; }
      if (!window.XLSX) { showToast('โหลดตัวสร้างไฟล์ Excel ไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error'); return; }

      const workbook = XLSX.utils.book_new();
      appendSheet(workbook, 'สรุปภาพรวม', buildOverviewExportRows(resultsData));
      appendSheet(workbook, 'ตอนที่ 1', buildPart1ExportRows(resultsData));
      appendSheet(workbook, 'ตอนที่ 2 รายข้อ', buildPart2ItemsExportRows(resultsData));
      appendSheet(workbook, 'ตอนที่ 2 รายด้าน', buildPart2CategoryExportRows(resultsData));
      appendSheet(workbook, 'ตอนที่ 3', buildPart3ExportRows(resultsData));
      appendSheet(workbook, 'คำตอบรายคน', buildResponseExportRows(resultsData));

      const now = new Date();
      const stamp = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}`;
      XLSX.writeFile(workbook, `evaluation-results-${stamp}.xlsx`);
    }

    function appendSheet(workbook, name, rows) {
      const sheet = XLSX.utils.json_to_sheet(rows.length ? rows : [{ ข้อมูล: 'ไม่มีข้อมูล' }]);
      XLSX.utils.book_append_sheet(workbook, sheet, name);
    }

    function buildOverviewExportRows(data) {
      const overall = data.part2 && data.part2.overall ? data.part2.overall : {};
      return [
        { รายการ: 'จำนวนผู้ตอบแบบประเมินทั้งหมด', ค่า: data.totalResponses, หน่วย: 'คน' },
        { รายการ: 'ค่าเฉลี่ยรวมตอนที่ 2', ค่า: numberText(overall.mean), หน่วย: 'คะแนน' },
        { รายการ: 'S.D. รวมตอนที่ 2', ค่า: numberText(overall.sd), หน่วย: '' },
        { รายการ: 'ระดับผลรวมตอนที่ 2', ค่า: overall.interpret || '', หน่วย: '' }
      ];
    }

    function buildPart1ExportRows(data) {
      const rows = [];
      (data.part1 || []).forEach(q => {
        (q.options || []).forEach(option => rows.push({
          questionId: q.questionId,
          คำถาม: q.questionText,
          ตัวเลือก: option.label,
          จำนวน: option.count,
          ร้อยละ: option.percent
        }));
      });
      return rows;
    }

    function buildPart2ItemsExportRows(data) {
      return ((data.part2 && data.part2.items) || []).map(item => ({
        questionId: item.questionId,
        หมวด: item.category,
        รายการประเมิน: item.questionText,
        n: item.n,
        ค่าเฉลี่ย: numberText(item.mean),
        SD: numberText(item.sd),
        ระดับ: item.interpret
      }));
    }

    function buildPart2CategoryExportRows(data) {
      const rows = ((data.part2 && data.part2.byCategory) || []).map(item => ({
        หมวด: item.category,
        n: item.n,
        ค่าเฉลี่ย: numberText(item.mean),
        SD: numberText(item.sd),
        ระดับ: item.interpret
      }));
      const overall = data.part2 && data.part2.overall;
      if (overall) rows.push({ หมวด: 'ภาพรวม', n: overall.n, ค่าเฉลี่ย: numberText(overall.mean), SD: numberText(overall.sd), ระดับ: overall.interpret });
      return rows;
    }

    function buildPart3ExportRows(data) {
      const rows = [];
      (data.part3 || []).forEach(q => {
        if (!q.answers || q.answers.length === 0) {
          rows.push({ questionId: q.questionId, คำถาม: q.questionText, ลำดับ: '', คำตอบ: '' });
        } else {
          q.answers.forEach((answer, index) => rows.push({
            questionId: q.questionId,
            คำถาม: q.questionText,
            ลำดับ: index + 1,
            คำตอบ: answer
          }));
        }
      });
      return rows;
    }

    function buildResponseExportRows(data) {
      const questions = data.questions || [];
      return (data.responses || []).map(response => {
        const row = {
          เวลา: response.timestamp || '',
          เลขที่เกียรติบัตร: response.certNo || '',
          ชื่อ: response.fullName || '',
          โรงเรียน: response.school || ''
        };
        questions.forEach(question => {
          row[`${question.questionId} ${question.questionText}`] = formatAnswerForExport(response.answers ? response.answers[question.questionId] : '');
        });
        return row;
      });
    }

    function formatAnswerForExport(value) {
      if (value === undefined || value === null) return '';
      if (Array.isArray(value)) return value.join(', ');
      return value;
    }

    function numberText(value) {
      const n = Number(value);
      return isNaN(n) ? '' : Math.round(n * 100) / 100;
    }

    // ============================================================
    //  หน้า 5: ตั้งค่าระบบ (เฉพาะ Admin)
    // ============================================================
    async function loadSettings() {
      const el = document.getElementById('page-settings');
      el.innerHTML = '<div class="text-center py-10 text-gray-400">กำลังโหลด...</div>';
      const res = await callApiCached('getSettings');
      if (!res.success) { el.innerHTML = '<p class="text-red-500">โหลดข้อมูลไม่สำเร็จ</p>'; return; }
      const s = res.data;

      el.innerHTML = `
        <div class="bg-white rounded-2xl shadow p-6 mb-6 max-w-2xl">
          <h3 class="font-semibold text-gray-800 mb-4">⚙️ ตั้งค่าเกียรติบัตร</h3>
          <form onsubmit="saveSettings(event)" class="space-y-4">
            ${settingInput('projectName', 'ชื่อโครงการ', s.projectName)}
            ${settingInput('certDate', 'วันที่บนเกียรติบัตร', s.certDate)}
            ${settingInput('certPrefix', 'รูปแบบเลขที่ ({NO:0000}=เลขอารบิก, {NO_TH:๐๐๐๐}=เลขไทย)', s.certPrefix)}
            ${settingInput('startNumber', 'เลขเริ่มต้น', s.startNumber)}
            ${settingInput('certCount', 'จำนวนเกียรติบัตร', s.certCount)}
            ${settingInput('ratingYear', 'ปีที่ใช้ในเลขที่ ({YEAR} / {YEAR_TH})', s.ratingYear)}
            ${settingInput('folderId', 'Drive Folder ID', s.folderId)}
            ${settingInput('templateId', 'Slides Template ID', s.templateId)}
            <div class="flex flex-col sm:flex-row gap-3">
              <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-medium">💾 บันทึกการตั้งค่า</button>
              <button type="button" onclick="regenerateCertNumbers()" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2.5 rounded-xl font-medium">🔢 รันเลขเกียรติบัตรใหม่</button>
            </div>
          </form>
        </div>
        <div class="bg-white rounded-2xl shadow p-6 max-w-2xl">
          <h3 class="font-semibold text-gray-800 mb-4">👥 จัดการผู้ใช้</h3>
          <div id="usersList" class="text-gray-400 text-sm">กำลังโหลด...</div>
        </div>`;
      loadUsers();
    }

    function settingInput(key, label, value) {
      return `<div>
        <label class="block text-sm font-medium text-gray-700 mb-1">${label}</label>
        <input type="text" id="set_${key}" value="${value || ''}" class="w-full px-3 py-2 border rounded-lg">
      </div>`;
    }

    async function saveSettings(event) {
      event.preventDefault();
      const settings = getSettingsFormValues();
      showLoading('กำลังบันทึก...');
      const res = await callApi('saveSettings', { settings }, 'POST');
      hideLoading();
      showToast(res.message, res.success ? 'success' : 'error');
      if (res.success) clearApiCache('getSettings');
    }

    function getSettingsFormValues() {
      const keys = ['projectName', 'certDate', 'certPrefix', 'startNumber', 'certCount', 'ratingYear', 'folderId', 'templateId'];
      const settings = {};
      keys.forEach(k => settings[k] = document.getElementById('set_' + k).value);
      return settings;
    }

    async function regenerateCertNumbers() {
      const confirmed = await confirmAction('รันเลขเกียรติบัตรใหม่?', 'ระบบจะเขียนทับคอลัมน์ runNo และ certNo ในชีต Certificates ตามค่า Settings ปัจจุบัน', 'รันเลขใหม่');
      if (!confirmed) return;
      showLoading('กำลังบันทึกและรันเลขเกียรติบัตร...');
      const saveRes = await callApi('saveSettings', { settings: getSettingsFormValues() }, 'POST');
      if (!saveRes.success) {
        hideLoading();
        showToast(saveRes.message, 'error');
        return;
      }
      const res = await callApi('regenerateCertificateNumbers', {}, 'POST');
      hideLoading();
      showToast(res.message, res.success ? 'success' : 'error');
      if (res.success) { clearApiCache('getSettings'); clearApiCache('getCertificates'); clearApiCache('getDashboard'); }
    }

    async function loadUsers() {
      const res = await callApiCached('getUsers');
      const el = document.getElementById('usersList');
      if (!res.success) { el.innerHTML = '<p class="text-red-500">โหลดไม่สำเร็จ</p>'; return; }
      let html = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50 text-gray-600"><tr><th class="px-3 py-2 text-left">สิทธิ์</th><th class="px-3 py-2 text-left">รหัสผ่าน</th><th class="px-3 py-2 text-left">ชื่อแสดง</th></tr></thead><tbody>';
      res.data.forEach(u => {
        html += `<tr class="border-b"><td class="px-3 py-2">${u.role==='admin'?'👑 Admin':'👤 Staff'}</td><td class="px-3 py-2 font-mono">${u.password}</td><td class="px-3 py-2">${u.displayName}</td></tr>`;
      });
      html += '</tbody></table></div><p class="text-xs text-gray-400 mt-2">* แก้ไขรหัสผ่านได้ที่ชีต Users ใน Google Sheet</p>';
      el.innerHTML = html;
    }

    // ============ เริ่มต้น: เช็ค session ============
    window.addEventListener('DOMContentLoaded', () => {
      const saved = sessionStorage.getItem('certAdminUser');
      if (saved) {
        currentUser = JSON.parse(saved);
        enterApp();
      }
    });
  </script>
